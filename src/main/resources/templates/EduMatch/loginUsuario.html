<!Doctype html/>

<html lang="pt-br">
	<head>
		<title>EduMatch - Login Usuário</title>
		<meta charset="utf-8"/>
		<link rel="stylesheet" type="text/css" th:href="@{/reset.css}"/>
		<link rel="stylesheet" type="text/css" th:href="@{/base.css}"/>
		<link rel="stylesheet" type="text/css" th:href="@{/style.css}"/>
	</head>
	<body>
		<div class="conteiner-principal">
			<div class="logomarca">
				<img alt="logo Edu Match" th:src="@{/imagens/livro.png}"/>
				<h1 class="corUm">Edu</h1>
				<h1 class="corDois">Match</h1>
			</div>
			<div class="login-cadastrado">
				<h1 class="">Já possui Cadastro?</h1>
				<strong>Então faça seu Login:</strong>
				<a th:href="@{/loginCadastrado}"><strong>Iniciar Seção</strong></a>
			</div>
			<div class="login-nao-cadastrado">
				<h2>Ainda não Possui Cadastro?</h2>
				<strong>Então faça seu cadastro!</strong>
				<a th:href="@{/cadastrar}"><strong>Cadastre-se</strong></a>
			</div>
		</div>	
	</body>
</html>
